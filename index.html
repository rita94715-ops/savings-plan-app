<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>我的存錢計畫</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #4a90e2; /* 預設背景色 */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background-image 0.5s ease;
        }

        .container {
            width: 90%;
            max-width: 400px;
            padding: 25px;
            border-radius: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            color: white;
            text-align: center;
        }

        h2 { margin-bottom: 10px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }

        /* 進度條樣式 */
        .progress-box {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            height: 15px;
            margin: 20px 0;
            overflow: hidden;
        }
        #bar {
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            width: 0%;
            height: 100%;
            transition: width 0.5s ease;
        }

        /* 輸入框與按鈕 */
        input {
            width: 80%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.1);
            color: white;
            outline: none;
        }
        input::placeholder { color: rgba(255,255,255,0.6); }

        .btn-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 12px 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin: 5px;
        }
        .btn-glass:active { transform: scale(0.95); background: rgba(255,255,255,0.3); }

        .setting-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
            font-size: 0.9em;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 id="title-display">我的存錢計畫</h2>
    <div class="progress-box"><div id="bar"></div></div>
    <p>目前: $<span id="curr-text">0</span> / 目標: $<span id="goal-text">0</span></p>
    
    <input type="number" id="add-amount" placeholder="輸入存入金額">
    <button class="btn-glass" onclick="addMoney()">確認存錢</button>

    <div class="setting-section">
    <p>⚙️ 設定</p>
    <input type="text" id="set-title" placeholder="修改計畫名稱">
    <input type="number" id="set-goal" placeholder="設定目標金額">
    
    <p style="margin-top:15px; font-size:0.8em; opacity:0.8;">📸 更換背景圖 (建議選直向照片)</p>
    <input type="file" id="file-bg" accept="image/*" style="width:80%; padding:5px;">
    
    <button class="btn-glass" onclick="updateSettings()">更新設定</button>
</div>

<script>
    // 初始化資料
    let data = JSON.parse(localStorage.getItem('save_app_data')) || {
        title: "我的存錢計畫",
        goal: 10000,
        current: 0,
        bg: ""
        // 1. 修改更新設定的函式 (這個要對應你 HTML 裡的按鈕)
// 記得前面要加上 async
async function updateSettings() {
    let newTitle = document.getElementById('set-title').value;
    let newGoal = document.getElementById('set-goal').value;
    let fileInput = document.getElementById('file-bg'); // 抓取剛才加的選檔案按鈕

    if (newTitle) data.title = newTitle;
    if (newGoal) data.goal = parseFloat(newGoal);

    // 處理相簿照片的邏輯
    if (fileInput.files && fileInput.files[0]) {
        const file = fileInput.files[0];
        // 讀取並壓縮圖片 (避免手機存不下)
        data.bg = await convertAndCompress(file);
    }

    refreshUI();
    alert("設定已儲存！");
}

// 這是必備的壓縮工具，請貼在 updateSettings 下方
function convertAndCompress(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                let w = img.width, h = img.height;
                if (w > 1080) { h *= 1080 / w; w = 1080; } // 限制寬度在 1080px
                canvas.width = w; canvas.height = h;
                ctx.drawImage(img, 0, 0, w, h);
                resolve(canvas.toDataURL('image/jpeg', 0.7)); // 壓縮品質 0.7
            };
        };
    });
}
}
    let newTitle = document.getElementById('set-title').value;
    let newGoal = document.getElementById('set-goal').value;
    let fileInput = document.getElementById('file-bg'); // 對應新加的 input id

    if (newTitle) data.title = newTitle;
    if (newGoal) data.goal = parseFloat(newGoal);

    // 檢查是否有選取檔案
    if (fileInput.files && fileInput.files[0]) {
        const file = fileInput.files[0];
        // 呼叫下方的壓縮工具，轉成代碼存入 data.bg
        data.bg = await convertAndCompress(file);
    }

    refreshUI();
    alert("設定與背景已儲存！");
}
    };

    function refreshUI() {
        document.getElementById('title-display').innerText = data.title;
        document.getElementById('goal-text').innerText = data.goal;
        document.getElementById('curr-text').innerText = data.current;
        
        // 更新進度條
        let percent = (data.current / data.goal) * 100;
        document.getElementById('bar').style.width = Math.min(percent, 100) + "%";

        // 更新背景
        if (data.bg) {
            document.body.style.backgroundImage = `url('${data.bg}')`;
        }

        // 存入記憶區
        localStorage.setItem('save_app_data', JSON.stringify(data));
    }

    function addMoney() {
        let amt = parseFloat(document.getElementById('add-amount').value) || 0;
        data.current += amt;
        document.getElementById('add-amount').value = ""; // 清空輸入框
        refreshUI();
    }

    function updateSettings() {
        let newTitle = document.getElementById('set-title').value;
        let newGoal = document.getElementById('set-goal').value;
        let newBg = document.getElementById('set-bg').value;

        if (newTitle) data.title = newTitle;
        if (newGoal) data.goal = parseFloat(newGoal);
        if (newBg) data.bg = newBg;

        refreshUI();
        alert("設定已儲存！");
    }

    // 頁面開啟時執行一次
    refreshUI();
</script>

</body>
</html>
