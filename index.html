<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>存錢小助手</title>
    <style>
        body { margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: #4a90e2; background-size: cover; background-position: center; background-attachment: fixed; font-family: sans-serif; transition: 0.5s; color: white; }
        .container { width: 90%; max-width: 400px; padding: 25px; background: rgba(255,255,255,0.2); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.3); text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
        .progress-box { background: rgba(0,0,0,0.1); border-radius: 10px; height: 15px; margin: 20px 0; overflow: hidden; }
        #bar { background: linear-gradient(90deg, #4facfe, #00f2fe); width: 0%; height: 100%; transition: 0.5s; }
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.1); color: white; outline: none; }
        .btn { background: rgba(255,255,255,0.3); border: 1px solid rgba(255,255,255,0.4); border-radius: 10px; padding: 12px 25px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn:active { transform: scale(0.95); }
        .setting-area { margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="title-display">我的存錢計畫</h2>
    <div class="progress-box"><div id="bar"></div></div>
    <p>$<span id="curr-text">0</span> / $<span id="goal-text">0</span></p>
    
    <input type="number" id="add-amount" placeholder="輸入存入金額">
    <button class="btn" onclick="addMoney()">確認存錢</button>

    <div class="setting-area">
        <p>⚙️ 設定區域</p>
        <input type="text" id="set-title" placeholder="修改計畫名稱">
        <input type="number" id="set-goal" placeholder="設定目標金額">
        <p style="font-size: 0.8em; margin-bottom: 5px;">📸 更換背景圖</p>
        <input type="file" id="file-bg" accept="image/*">
        <button class="btn" onclick="updateSettings()">更新設定</button>
    </div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('save_app_data')) || { title: "我的存錢計畫", goal: 10000, current: 0, bg: "" };

    function refreshUI() {
        document.getElementById('title-display').innerText = data.title;
        document.getElementById('goal-text').innerText = data.goal;
        document.getElementById('curr-text').innerText = data.current;
        let percent = (data.current / data.goal) * 100;
        document.getElementById('bar').style.width = Math.min(percent, 100) + "%";
        if (data.bg) document.body.style.backgroundImage = `url('${data.bg}')`;
        localStorage.setItem('save_app_data', JSON.stringify(data));
    }

    function addMoney() {
        let amt = parseFloat(document.getElementById('add-amount').value) || 0;
        data.current += amt;
        document.getElementById('add-amount').value = "";
        refreshUI();
    }

    async function updateSettings() {
        let nt = document.getElementById('set-title').value;
        let ng = document.getElementById('set-goal').value;
        let fi = document.getElementById('file-bg');

        if (nt) data.title = nt;
        if (ng) data.goal = parseFloat(ng);

        if (fi.files && fi.files[0]) {
            // 讀取照片並壓縮
            const reader = new FileReader();
            reader.readAsDataURL(fi.files[0]);
            reader.onload = e => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    if (w > 1080) { h *= 1080/w; w = 1080; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    data.bg = canvas.toDataURL('image/jpeg', 0.7);
                    refreshUI(); // 圖片讀完才刷畫面
                };
            };
        } else {
            refreshUI();
        }
        alert("設定已成功儲存！");
    }

    // 初次開啟網頁載入資料
    refreshUI();
</script>

</body>
</html>
